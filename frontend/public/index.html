<!DOCTYPE html>
<html>
  <body>
    <p>
      Hello, world
    </p>

      <!-- temporary, will be moved to search page when it exists !-->
      <input id="queryInput" placeholder="search for courses">
      <button id="searchBtn">Search</button>
      <ul id="courses"></ul>



<script>
  /*  event listeners */
  document.getElementById("searchBtn")
    .addEventListener("click", search);


  /*  get paths  */

  async function loadResults() {
    const res = await fetch("/search");
    const items = await res.json();

    const list = document.getElementById("courses");
    list.innerHTML = "";

    for (const item of items) {

        const li = document.createElement("li");
        li.textContent = item.subject + "" + item.number + " " + item.section + "  " + item.name ;
        const button = document.createElement("button");
        const inSch = await fetch("/inSchedule");
        if(inSch === "True"){
          button.innerText = "Remove Course";
        }else{
          button.innerText = "Add Course";
        }
        button.id = ""+item.subject+item.number+item.section;
        button.addEventListener('click', function(event) {
            const clickedButton = event.target;
            addOrRemove(clickedButton);
        });

        li.appendChild(button);
        list.appendChild(li);
    }

  }

  /* post paths */
  async function search(){
    const input = document.getElementById("queryInput");
    const query = input.value.trim();
    if (!query) return;

    await fetch("/search", {
        method: "POST",
        body: query
    });

    loadResults();
  }
  async function addOrRemove(button){
    //TODO: change this later
    if(button.innerText === "Add Course"){
      button.innerText = "Remove Course";
    }else{
      button.innerText = "Add Course";
    }

    const courseCode = button.id;
    await fetch("/addOrDelete", {
      method: "POST",
      body: courseCode
    });
  }


</script>

  </body>
</html>
